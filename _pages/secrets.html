<div class="secrets-wrap">
  <p>Should you be here? Do you know why you're here? Convince me why you should be here.</p>
  <input type="password" id="key" placeholder="Type Essay Here" autocomplete="off" />
  <button id="go" onclick="start()">Persuade</button>
  <div id="status"></div>
  <ul id="codes"></ul>
</div>

<script>
const WORKER = "https://lionmail-2fa.alexhuang.workers.dev/";
let timer = null;
let elapsed = 0;
const INTERVAL = 8000;  // poll every 8 seconds
const TIMEOUT = 300000; // stop after 5 minutes

function start() {
  const key = document.getElementById("key").value.trim();
  if (!key) return;
  document.getElementById("go").disabled = true;
  document.getElementById("codes").innerHTML = "";
  elapsed = 0;
  poll(key);
  timer = setInterval(() => {
    elapsed += INTERVAL;
    if (elapsed >= TIMEOUT) stop("Stopped after 5 minutes.");
    else poll(key);
  }, INTERVAL);
}

function stop(msg) {
  clearInterval(timer);
  timer = null;
  document.getElementById("go").disabled = false;
  if (msg) document.getElementById("status").textContent = msg;
}

async function poll(key) {
  document.getElementById("status").textContent = "Checking\u2026";
  try {
    const res = await fetch(WORKER + "?key=" + encodeURIComponent(key));
    const data = await res.json();
    if (res.status === 401) { stop("I dislike your arguments. Please get out."); return; }
    if (data.error && !data.codes) {
      document.getElementById("status").textContent = data.error;
      return;
    }
    render(data.codes || []);
    const remaining = Math.round((TIMEOUT - elapsed) / 1000);
    document.getElementById("status").textContent =
      "Last checked: " + new Date().toLocaleTimeString() + " · refreshing every 8s · " + remaining + "s remaining";
  } catch (e) {
    document.getElementById("status").textContent = "Network error.";
  }
}

function render(codes) {
  const ul = document.getElementById("codes");
  ul.innerHTML = codes.map(c => {
    const d = c.date ? new Date(c.date).toLocaleString() : "";
    const from = (c.from || "").replace(/<[^>]+>/g, "").trim();
    return '<li>'
      + '<div class="code">' + esc(c.code || "—") + '</div>'
      + '<div class="meta">' + esc(d) + '</div>'
      + '</li>';
  }).join("");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}
</script>
